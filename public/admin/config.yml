backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

locale: fr

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Page d'accueil
        file: src/content/home.json
        fields:

          - label: "HERO"
            name: hero
            widget: object
            fields:
              - { label: "Titre H1", name: title, widget: string }
              - { label: "Sous-titre", name: subtitle, widget: text }
              - { label: "Bouton principal", name: cta_primary, widget: string }
              - { label: "Bouton secondaire (lien discret)", name: cta_secondary, widget: string }

          - label: "POURQUOI LIATOPIE"
            name: pourquoi
            widget: object
            fields:
              - { label: "Titre de section", name: title, widget: string }
              - { label: "Introduction", name: intro, widget: text }
              - label: "Cartes (3)"
                name: cards
                widget: list
                fields:
                  - { label: "Titre", name: titre, widget: string }
                  - { label: "Corps", name: corps, widget: text }
                  - { label: "Phrase gain (optionnel — carte 3 uniquement)", name: gain_phrase, widget: text, required: false }

          - label: "POUR QUI"
            name: pour_qui
            widget: object
            fields:
              - { label: "Titre", name: titre, widget: string }
              - { label: "Paragraphe 1", name: corps_1, widget: text }
              - { label: "Stat — texte", name: stat_texte, widget: text }
              - { label: "Stat — source", name: stat_source, widget: string }
              - { label: "Paragraphe 2", name: corps_2, widget: text }
              - { label: "Paragraphe 2 — source", name: corps_2_source, widget: string }
              - { label: "Encart — citation", name: encart_quote, widget: text }
              - { label: "Encart — source", name: encart_source, widget: string }
              - { label: "Encart — accroche finale", name: encart_cta, widget: string }

          - label: "COMMENT ÇA MARCHE"
            name: comment
            widget: object
            fields:
              - { label: "Titre", name: titre, widget: string }
              - { label: "Mécanisme de la cascade", name: cascade_mecanisme, widget: text }
              - { label: "Note sur l'arrêt à tout moment", name: intro, widget: text }
              - label: "Étapes (5)"
                name: etapes
                widget: list
                fields:
                  - { label: "Numéro", name: num, widget: string }
                  - { label: "Nom de l'étape", name: tag, widget: string }
                  - { label: "Détail (durée / financement)", name: detail, widget: string }
                  - { label: "Description", name: corps, widget: text }
                  - { label: "Livrable", name: livrable, widget: string }
                  - { label: "Prix", name: prix, widget: text }

          - label: "PREUVE SOCIALE"
            name: preuve_sociale
            widget: object
            fields:
              - { label: "Titre (note /10)", name: titre, widget: string }
              - { label: "Sous-titre (question posée)", name: sous_titre, widget: text }
              - label: "Verbatims"
                name: verbatims
                widget: list
                field:
                  label: "Citation"
                  name: item
                  widget: text
              - { label: "Mention Qualiopi / Ecotopie", name: caution, widget: text }

          - label: "FORMULAIRE CONTACT"
            name: contact
            widget: object
            fields:
              - { label: "Titre", name: titre, widget: string }
              - { label: "Sous-titre", name: sous_titre, widget: string }
              - { label: "Item liste 1", name: item_1, widget: string }
              - { label: "Item liste 2", name: item_2, widget: string }
              - { label: "Note financement OPCO", name: opco_info, widget: text }

  - name: diagnostic
    label: "Diagnostic temps AO"
    files:
      - name: diagnostic
        label: "Contenu du diagnostic"
        file: src/content/diagnostic.json
        fields:

          - label: "Écran 1 — Introduction"
            name: intro
            widget: object
            fields:
              - { label: "Bandeau (eyebrow)", name: eyebrow, widget: string }
              - { label: "Titre H1", name: titre, widget: string }
              - { label: "Texte d'introduction", name: lede, widget: text }
              - { label: "Titre du tableau des phases", name: phases_titre, widget: string }
              - label: "Phases (9)"
                name: phases
                widget: list
                fields:
                  - { label: "Nom de la phase", name: nom, widget: string }
                  - { label: "Temps moyen", name: temps, widget: string }
              - { label: "Note de source", name: source_note, widget: text }
              - { label: "Titre avant les questions", name: questions_titre, widget: string }
              - label: "Questions (5)"
                name: questions
                widget: list
                fields:
                  - { label: "Libellé (ex: Question 1)", name: label, widget: string }
                  - { label: "Texte de la question", name: texte, widget: text }
                  - label: "Options de réponse (4)"
                    name: options
                    widget: list
                    fields:
                      - { label: "Texte de l'option", name: texte, widget: string }
                      - { label: "Valeur en heures", name: val, widget: number, value_type: float }
              - { label: "Texte du bouton", name: cta, widget: string }

          - label: "Écran 2 — Résultats"
            name: resultat
            widget: object
            fields:
              - { label: "Bandeau (eyebrow)", name: eyebrow, widget: string }
              - { label: "Titre", name: titre, widget: string }
              - { label: "Texte avant le pourcentage", name: gain_label, widget: string }
              - { label: "Texte après le pourcentage", name: gain_suffix, widget: string }
              - { label: "Label stat — avant", name: stat_avant_label, widget: string }
              - { label: "Label stat — après", name: stat_apres_label, widget: string }
              - { label: "Intro des piliers", name: piliers_intro, widget: text }
              - label: "Piliers (6 tags)"
                name: piliers
                widget: list
                field: { label: "Pilier", name: pilier, widget: string }
              - { label: "Intro de la vidéo", name: video_intro, widget: text }
              - { label: "Titre du formulaire", name: lead_titre, widget: string }
              - { label: "Sous-titre du formulaire", name: lead_lede, widget: text }
              - { label: "Bouton du formulaire", name: lead_cta, widget: string }

          - label: "Écran 3 — Merci"
            name: merci
            widget: object
            fields:
              - { label: "Bandeau (eyebrow)", name: eyebrow, widget: string }
              - { label: "Titre", name: titre, widget: string }
              - { label: "Message", name: lede, widget: text }
